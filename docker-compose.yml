# ============================================================
# DocMind — Docker Compose
# ============================================================
# Spins up the full local development stack:
#   - docmind-app   : The Spring Boot application
#   - chromadb      : Vector database for document embeddings
#   - ollama        : Local LLM runner (Mistral for validation)
#   - prometheus    : Metrics scraping
#   - grafana       : Metrics visualization dashboard
#
# Usage:
#   1. Copy .env.example to .env and fill in your OPENAI_API_KEY.
#   2. docker compose up -d
#   3. Pull Mistral: docker exec docmind-ollama ollama pull mistral
#   4. Access the app: http://localhost:8080/swagger-ui.html
# ============================================================

name: docmind

services:

  # ── ChromaDB — Vector Store ───────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: docmind-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma    # Persist embeddings across restarts
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - ANONYMIZED_TELEMETRY=false    # Disable telemetry for privacy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - docmind-net

  # ── Ollama — Local LLM (Mistral for validation) ───────────────────────────
  # GPU note: If you have an NVIDIA GPU, add:
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  ollama:
    image: ollama/ollama:latest
    container_name: docmind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama    # Cache pulled models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - docmind-net

  # ── DocMind Application ───────────────────────────────────────────────────
  docmind-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docmind-app
    ports:
      - "8080:8080"     # Application port
    environment:
      # LLM Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=http://docmind-ollama:11434
      - OLLAMA_MODEL=mistral
      # ChromaDB
      - CHROMA_HOST=docmind-chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=docmind-kb
      # Spring profile
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s    # Spring Boot 4 + AI models need more startup time
    networks:
      - docmind-net
    # Resource limits (tune based on your machine)
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"

  # ── Prometheus — Metrics Scraping ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: docmind-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - docmind-app
    networks:
      - docmind-net

  # ── Grafana — Metrics Dashboard ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: docmind-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - docmind-net

volumes:
  chroma_data:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  docmind-net:
    driver: bridge
