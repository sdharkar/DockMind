server:
  port: 8080

spring:
  application:
    name: docmind-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: query_route
          uri: lb://docmind-api
          predicates:
            - Path=/api/v1/query, /api/v1/query/**
        - id: documents_route
          uri: lb://docmind-api
          predicates:
            - Path=/api/v1/documents, /api/v1/documents/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
